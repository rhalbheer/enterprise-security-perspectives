name: "📝 Feedback"
description: "Share a suggestion, correction, question, or alternative perspective."
title: "Feedback: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing to **Enterprise Security Perspectives**.

        If the issue is **dangerously misleading** and could cause real harm if followed, please report it privately via the [Security Policy](https://github.com/rhalbheer/enterprise-security-perspectives/blob/main/SECURITY.md) instead of opening a public issue.

  - type: dropdown
    id: feedback_type
    attributes:
      label: Type of feedback
      options:
        - Suggestion
        - Correction or improvement
        - Counter-argument
        - Question
        - Other
    validations:
      required: true

  - type: dropdown
    id: document
    attributes:
      label: Related document or section (optional)
      description: "Select the document your feedback relates to, if applicable."
      options:
        - Security at Machine Speed — The Comprehensive Edition
        - Security at Machine Speed — The Leadership Edition
        - Security at Machine Speed — The Essentials Edition
        - Security at Machine Speed — Appendix
        - Security at Machine Speed — Board of Directors' Role Guide
        - Security at Machine Speed — CEO Role Guide
        - Security at Machine Speed — CFO Role Guide
        - Security at Machine Speed — CIO Role Guide
        - Security at Machine Speed — CISO Role Guide
        - Security at Machine Speed — CTO Role Guide
        - Security at Machine Speed — DPO Role Guide
        - Security at Machine Speed — Head of Regulatory Compliance Role Guide
        - Security at Machine Speed — Head of Security Architecture Role Guide
        - Security at Machine Speed — Head of Threat Intelligence Role Guide
        - Security at Machine Speed — Head of SOC Role Guide
        - Security at Machine Speed — Internal Audit Role Guide
        - Your Security Model Is Too Slow to Matter
        - Digital Sovereignty In Practice
        - Other
    validations:
      required: false

  - type: textarea
    id: details
    attributes:
      label: Your feedback
      description: "Share the key point, question, or proposed change."
      placeholder: "What would you like to add, challenge, clarify, or correct?"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context (optional)
      description: "Add references, background, or a suggested wording change if helpful."
    validations:
      required: false
